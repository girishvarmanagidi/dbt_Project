sources:
  - name: raw_schema
    description: "This schema contains the raw employee HR data ingested from source systems."
    database: girish_dbt
    schema: raw_schema
    tables:
      - name: employee_hr_data
        description: "Raw employee HR data containing employee details, satisfaction metrics, job information, and employment history."

        columns:
          - name: age
            description: "Employee age."

          - name: attrition
            description: "Indicates whether the employee left the company."

          - name: businesstravel
            description: "Business travel frequency of the employee."

          - name: dailyrate
            description: "Daily salary rate of the employee."

          - name: department
            description: "Department where the employee works."

          - name: distancefromhome
            description: "Distance between employee home and workplace."

          - name: education
            description: "Education level of the employee."

          - name: educationfield
            description: "Field of education."

          - name: employeecount
            description: "Employee count value."

          - name: employeenumber
            description: "Unique employee identifier."

          - name: environmentsatisfaction
            description: "Employee satisfaction with work environment."

          - name: gender
            description: "Employee gender."

          - name: hourlyrate
            description: "Hourly salary rate."

          - name: jobinvolvement
            description: "Employee involvement level in job activities."

          - name: joblevel
            description: "Job level of employee."

          - name: jobrole
            description: "Role or designation of employee."

          - name: jobsatisfaction
            description: "Employee job satisfaction rating."

          - name: maritalstatus
            description: "Employee marital status."

          - name: monthlyincome
            description: "Monthly income of employee."

          - name: monthlyrate
            description: "Monthly salary rate."

          - name: numcompaniesworked
            description: "Number of companies employee worked before."

          - name: over18
            description: "Indicates whether employee is above 18 years."

          - name: overtime
            description: "Indicates whether employee works overtime."

          - name: percentsalaryhike
            description: "Percentage salary hike received."

          - name: performancerating
            description: "Employee performance rating."

          - name: relationshipsatisfaction
            description: "Employee relationship satisfaction score."

          - name: standardhours
            description: "Standard working hours."

          - name: stockoptionlevel
            description: "Stock option level provided to employee."

          - name: totalworkingyears
            description: "Total years of work experience."

          - name: trainingtimeslastyear
            description: "Number of trainings completed last year."

          - name: worklifebalance
            description: "Employee work-life balance rating."

          - name: yearsatcompany
            description: "Number of years employee stayed in company."

          - name: yearsincurrentrole
            description: "Years spent in current role."

          - name: yearssincelastpromotion
            description: "Years since last promotion."

          - name: yearswithcurrmanager
            description: "Years working with current manager."

          - name: created_at
            description: "Timestamp when employee record was created."