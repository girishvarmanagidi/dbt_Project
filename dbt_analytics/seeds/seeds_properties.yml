seeds:
  - name: Education_Lookup
    description: This seed file contains the education levels and their corresponding descriptions.
    columns:
      - name: Education_Level
        description: This is unique identifier for the education levels.
      - name: Education_Value
        description: >
          This is the value corresponding to the education level namely
                     Tertiary Qualitfication
                     Diploma
                     Bachelor Degree
                     Masters Degree
                     Phd Degree

  
  - name: Environment_Satisfaction_Lookup
    description: This seed file contains the environment satisfaction levels and their corresponding values.
    columns:
      - name: Environment_Satisfaction_Level
        description: This is unique identifier for the environment satisfaction levels.
      - name: Environment_Satisfaction_Value
        description: >
          This is the value corresponding to the environment satisfaction level namely
                      Extremely unsatisfied
                      Unsatisfied
                      Satisfied
                      Extremely satisfied

